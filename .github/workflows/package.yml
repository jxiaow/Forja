name: Package

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  check:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run compile
      - run: node scripts/package-vs.js
      - run: node scripts/build-cli.js
      - name: Gather artifacts
        run: |
          VER=$(node -p "require('./package.json').version")
          mkdir -p _release
          cp dist/forja-${VER}/vs/*.vsix _release/
          cp dist/forja-${VER}/cli/forja-cli-*.tgz _release/
          tar czf _release/forja-skills-${VER}.tar.gz skills/
      - uses: actions/upload-artifact@v4
        with:
          name: forja-dist
          path: _release/*
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: forja-dist
      - name: Prepare release assets
        run: |
          mkdir -p _release
          mv -f *.vsix *.tgz *.tar.gz _release/ 2>/dev/null || true
      - name: Build release body
        run: |
          cat > _release/body.md << 'BODYEOF'
          ## 下载说明

          | 文件 | 用途 |
          | --- | --- |
          | `*.vsix` | **VSCode 扩展** — 下载后双击安装，或 VSCode 中 "Install from VSIX" |
          | `*-cli-*.tgz` | **CLI 命令行工具** — `npm install -g ./forja-cli-*.tgz` |
          | `*-skills-*.tar.gz` | **AI 助手技能文件** — 解压后复制到 AI 工具的 skills 目录 |

          ## 更新内容

          BODYEOF
          gh api --method POST repos/${{ github.repository }}/releases/generate-notes \
            --field tag_name=${{ github.ref_name }} \
            --jq '.body' >> _release/body.md
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            _release/*.vsix _release/*.tgz _release/*.tar.gz \
            --repo "${{ github.repository }}" \
            --notes-file _release/body.md
        env:
          GH_TOKEN: ${{ github.token }}
